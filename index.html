Leonore Wagemans","Liam Orij","Lidewij Hilberts","Liesbeth Rhijnsburger","Linda Panchyrz","lise zijda","Liza Baardman","Lizzie Koreman","Louis-Paul Steinberg","Luba Kravchenko","Luc Lammens","Hilde Lammens","Lucas de Natris","Lucas van der Wielen","Luna van Rijn","Lusi van Heerwaarden","Luuk Dekker","Lynn Tielman","Lòni van der Lingen","Maaike Wilschut","Maarten Jansen","Mabel Wickenhagen","Magnus Bergendahl","Marga","Margit Klumpers","margreet ploegmakers","Marijn Van den Meiracker","Marijn Zeldenrijk","Marilieke Engbers","Mario van der Zwan","Marjanne van Zwol","Marlies Meijerink","Arno Meijerink","Marthè Moonen","Martin Eysberg","Martinette Susijn","Mats Hupkes","Matt Sanderson","Maud Keijzer","Max Duijnisveld","Max Gebski","Max van Dijk","May","Maya van Hulst","Mayron Maas","Mees Diederen","meis van den berg","Mia Punos","Michelle Van Dranen","Mieke van den Berg","Mika Jansen","Milan Eizinga","Minne Heijmen","Mirjam Verheul","Misha Duurland","Nadien von Winning","Nastia Welman","Neo Festen","Niamh McGuinness","Nick Lammerse","Nico Reinhoud","Niels","Niels Jongbloed","Niels Maurice Verpoorten","Niels Rijks","Nikolai Klaassen","Nils Reerink","Noah Bloemendaal","Noah Parris","Noor Severijn","Norbert Seinen","Noémi Pennartz","Odette Nipius","Okky Jaspers","Oksana Konstantinova","Olaf Bunnik","Ole Bouwman","Olga Alimova","Olga Langemeijer","Olive","Oliver Pilmeijer","Onno Verkuyl","Boele Verkuyl","Ophir Gautier","Osei Nathaniel Parris","Oxana Chevtchouk","Paco Westerkamp","Paola Hasbún Lopez","Paula da Silva Rodrigues","Peter Riebeek","Petra Kamp","Philip Kirch","Philip Wijsmuller","Piet van Kruistum","Pieter Hoek","Pieter van der Meyde","Pilar Lodeizen","Pilou","Pim Bouwman","Pirthi SIngh","Puck de Haan","Puck de Ruiter","Rachelle Vink","Raffi Rio Henderix","Ralph Pilleri","Ravi Hertzberger","Redian Canni , Jerayno Da Cruz","Rene de Keijzer","Rens Alleman","Ricardo","Ricardo da Cruz Paulino","Richard Egelie","Rico Tip","Rijk Willem Marttin","Rimme de Vries","Rita Maria van Huijstee","Rivesh Ramawadh","Rob Bleeker","Rob Koning","Rob Nipius","Robbin Haasnoot","Evert Antonie van Rossum","Robert van Ling","Robine ter Meulen","Roemer Smid","Ron Verweij","Ronald Mooijer","Roos Couwenhoven","Roos van den Heuvel","Rosa van de Woestijne","Rosalie Marieloe Doting","Rosita Hofman","Roy Derks van de Ven","Róisín McGuinness","Sabela Bergendahl","Sabina Kef","Sabina Wall","Sabine Maneschijn","Safouane Chahboun","Sam Appels","Sam van Rijnsoever","Sam Zwaaf","Samuel Benjamin de Lorm","Sara Jager","Savanna Kooistra","Savannah Braune","Sean Daly","Sebastian Jansen","Selly Vermeijden","Sem Marino","Semin Oguz","Sena Kahyaoglu","Senna Smit","Shadi makarem","Shareef Bhailal","Sheila Prommenschenckel","Sicco Foekema","Silver Sorber","silvia donzella","Simone Schreurs","Skip Schermerhorn","Sky van Koningshoven","Sophia Katherine Reaves","Sophie van der Steen","Stan Kiers","Stein Groen","Stella Raab","Steward", "Isabell", "Emma","Storm den Hartog","Susanne Dijkstra","Suzanne de Jong","Suzy Schagen","Sérane Calliste Brouwer","Talissa Tan","Tassel Maya","Tatiana Chevtchouk","Tess Slavenburg","Tess van Heeswijk","Teun Bouwman","Thijs Frank Verhagen","Thijs Jaspers","Thijs Vos","Tibbe Bottema","Tijmen Vroom","Tijn van Erven Dorens","Tjebbe Rijpma","Toon Höfelt","Toska Plantinga","Tracy Metz","Tristan van der Werf","Tuana Erkut","Ulbo de Sitter","Ursula weitzel","Lennert den Hollander","Vanessa Jacobs","Vera Gianotten","Vera Korthals","Vera schut","Vera wensing","Vicky Zimmerman","Viktor Nobel","vivian Veenendaal","Wester Kouwenhoven","Westerink","Wijnand van den Hoogen","Wim Gravemaker","Wolf Gautier","Wout Woltman","Julia Wassink","Tibbe Bottema","Xander den Boer","Yanouk Kuiper","Yemi Michael Akpose","Yke Constandse","Yoram Stein","Yuan de la Bretonière","Yuri van der Burgt","Yvonne Glas","Yvonne Schothorst","zeno boodt","Zwier Verkuijl"];  // State
  let checkedIn = {};
  let filtered = [];
  let searchTerm = "";

  // DOM refs
  const searchInput = document.getElementById('search');
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('count');
  const totalEl = document.getElementById('total');
  const statusEl = document.getElementById('status');
  const configBanner = document.getElementById('config-banner');

  totalEl.textContent = NAMES.length;

  // Check if Firebase is configured
  if (firebaseConfig.apiKey === "JOUW_API_KEY") {
    configBanner.style.display = 'flex';
    statusEl.textContent = "⚠️ Niet verbonden";
    statusEl.style.color = "#e07b39";
    // Fall back to localStorage only
    const stored = localStorage.getItem('checkedIn');
    if (stored) checkedIn = JSON.parse(stored);
    render();
  } else {
    // Firebase live sync
    const checkinRef = ref(db, 'checkins');
    onValue(checkinRef, (snapshot) => {
      checkedIn = snapshot.val() || {};
      render();
      statusEl.textContent = "● Live verbonden";
      statusEl.style.color = "#6dbf8a";
    }, (err) => {
      statusEl.textContent = "✗ Verbindingsfout";
      statusEl.style.color = "#e05f5f";
    });
  }

  function nameToKey(name) {
    return name.replace(/[.#$[\]/]/g, '_').replace(/\s+/g, '_');
  }

  function toggle(name) {
    const key = nameToKey(name);
    const newVal = !checkedIn[key];

    // Optimistic update
    checkedIn[key] = newVal;
    updateCard(name, newVal);
    updateCount();

    if (firebaseConfig.apiKey !== "JOUW_API_KEY") {
      const updates = {};
      updates['checkins/' + key] = newVal || null;
      update(ref(db), updates);
    } else {
      localStorage.setItem('checkedIn', JSON.stringify(checkedIn));
    }
  }

  function updateCount() {
    const n = Object.values(checkedIn).filter(Boolean).length;
    countEl.textContent = n;
  }

  function updateCard(name, isChecked) {
    const key = nameToKey(name);
    const card = document.querySelector(`[data-key="${key}"]`);
    if (!card) return;
    if (isChecked) {
      card.classList.add('checked');
    } else {
      card.classList.remove('checked');
    }
  }

  function normalize(str) {
    return str.toLowerCase()
      .replace(/[àáâäã]/g, 'a')
      .replace(/[èéêë]/g, 'e')
      .replace(/[ìíîï]/g, 'i')
      .replace(/[òóôöõ]/g, 'o')
      .replace(/[ùúûü]/g, 'u')
      .replace(/[ñ]/g, 'n')
      .replace(/[ç]/g, 'c');
  }

  function render() {
    const q = normalize(searchTerm.trim());
    filtered = q
      ? NAMES.filter(n => normalize(n).includes(q))
      : [...NAMES];

    // Sort: unchecked first, then checked; within each group alphabetically
    filtered.sort((a, b) => {
      const aChecked = !!checkedIn[nameToKey(a)];
      const bChecked = !!checkedIn[nameToKey(b)];
      if (aChecked !== bChecked) return aChecked ? 1 : -1;
      return a.localeCompare(b, 'nl');
    });

    listEl.innerHTML = '';
    const frag = document.createDocumentFragment();

    filtered.forEach(name => {
      const key = nameToKey(name);
      const isChecked = !!checkedIn[key];
      const card = document.createElement('div');
      card.className = 'card' + (isChecked ? ' checked' : '');
      card.dataset.key = key;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-pressed', isChecked);

      card.innerHTML = `
        <span class="name">${name}</span>
        <span class="check-icon">${isChecked ? '✓' : ''}</span>
      `;

      card.addEventListener('click', () => toggle(name));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') toggle(name); });
      frag.appendChild(card);
    });

    listEl.appendChild(frag);
    updateCount();
  }

  searchInput.addEventListener('input', () => {
    searchTerm = searchInput.value;
    render();
  });

  // Clear button
  document.getElementById('clear-search').addEventListener('click', () => {
    searchInput.value = '';
    searchTerm = '';
    searchInput.focus();
    render();
  });

  window._toggleApp = toggle;
  window._renderApp = render;
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1814;
    --surface: #231f1b;
    --surface2: #2e2924;
    --border: #3d3730;
    --accent: #c9a96e;
    --accent-dim: #7a6540;
    --text: #e8e0d4;
    --text-muted: #8a7e6e;
    --checked-bg: #1e2a1e;
    --checked-border: #4a7a4a;
    --checked-text: #8ab88a;
    --success: #6dbf8a;
    --radius: 10px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* CONFIG BANNER */
  #config-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: #3d2a0a;
    border-bottom: 1px solid #7a5a20;
    padding: 10px 16px;
    gap: 8px;
    align-items: flex-start;
    font-size: 13px;
    color: #e8c87a;
    line-height: 1.5;
  }
  #config-banner.active { display: flex; }
  #config-banner strong { color: #f0d090; }

  /* LAYOUT */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* HEADER */
  .header {
    flex-shrink: 0;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--accent);
  }

  .status {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .counter {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .counter strong {
    color: var(--text);
    font-weight: 500;
  }

  .counter .num-checked {
    color: var(--success);
    font-weight: 600;
    font-size: 15px;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 12px 40px 12px 40px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; /* 16px prevents iOS zoom */
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  #search:focus {
    border-color: var(--accent-dim);
  }

  #search::placeholder {
    color: var(--text-muted);
  }

  #clear-search {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 6px;
    line-height: 1;
    display: none;
  }

  #search:not(:placeholder-shown) ~ #clear-search { display: block; }

  /* LIST */
  .list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 20px;
    -webkit-overflow-scrolling: touch;
  }

  /* Custom scrollbar */
  .list-wrap::-webkit-scrollbar { width: 4px; }
  .list-wrap::-webkit-scrollbar-track { background: transparent; }
  .list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* CARDS */
  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    margin-bottom: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .card:active {
    transform: scale(0.985);
  }

  .card.checked {
    background: var(--checked-bg);
    border-color: var(--checked-border);
  }

  .name {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
    padding-right: 10px;
  }

  .card.checked .name {
    color: var(--checked-text);
  }

  .check-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    font-weight: 600;
    color: transparent;
    transition: all 0.12s;
  }

  .card.checked .check-icon {
    background: var(--checked-border);
    border-color: var(--checked-border);
    color: #e8f5e8;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty strong {
    display: block;
    font-size: 32px;
    margin-bottom: 8px;
  }

  /* iPad landscape optimization */
  @media (min-width: 768px) {
    .header {
      padding: 20px 28px 16px;
    }
    .title {
      font-size: 26px;
    }
    .list-wrap {
      padding: 12px 20px 24px;
    }
    .card {
      padding: 16px 20px;
      margin-bottom: 7px;
    }
    .name {
      font-size: 16px;
    }
  }

  @media (min-width: 1024px) {
    .list-wrap {
      column-count: 2;
      column-gap: 12px;
    }
    .card {
      break-inside: avoid;
      display: flex; /* override column layout quirk */
    }
  }
</style>
</head>
